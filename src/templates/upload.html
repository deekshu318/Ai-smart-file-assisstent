<div id="upload-view" class="view-container upload-view hidden">
    <div class="upload-header">
        <h1>Add the file</h1>
    </div>

    <div class="upload-container">
        <!-- Main Upload Card -->
        <div class="upload-main-card">
            <!-- Upload File Content -->
            <div class="tab-content active" id="tab-upload">
                <div class="drop-zone" id="file-drop-zone">
                    <i class="fas fa-download drop-icon"></i>
                    <p>Drop here or click to browse</p>
                    <input type="file" id="file-input" hidden multiple>
                </div>
            </div>
        </div>

        <!-- Formats Info Box -->
        <div class="formats-info-box">
            <button class="btn-upload-action" id="btn-trigger-file">Add</button>
            <p>Allowed formats: .pdf, .txt, .docx, .pptx</p>
        </div>

        <!-- Website Link Card -->
        <div class="link-card website-card">
            <div class="link-card-content">
                <div class="link-icon website">
                    <i class="fas fa-globe"></i>
                </div>
                <div class="website-inputs">
                    <div class="website-header">
                        <h3>Website</h3>
                        <div class="website-toggles">
                            <button class="toggle-pill active" data-type="single">Single page</button>
                            <button class="toggle-pill" data-type="discover">Discover pages</button>
                        </div>
                    </div>
                    <input type="text" class="link-input" id="website-link" placeholder="https://example.com/page">
                </div>
            </div>
            <button class="btn-upload-action" id="btn-add-website">Add</button>
        </div>
    </div>
</div>
