<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Password Reset</title>
    <link rel="stylesheet" href="/static/style.css?v=32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(124, 92, 252, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(91, 138, 255, 0.08) 0%, transparent 45%);
            color: #f8fafc;
        }
        .container {
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }
        .success-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.75rem 0;
            color: #ffffff;
        }
        .success-card p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 2rem 0;
        }
        .btn-primary {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, #7c5cfc, #a855f7);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(124, 92, 252, 0.2);
            width: 100%;
            box-sizing: border-box;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(124, 92, 252, 0.4);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2>Password Updated</h2>
            <p>Your password has been successfully reset. You can now return to the application and sign in with your new credentials.</p>
            <a href="/" class="btn-primary">Return to Sign In</a>
        </div>
    </div>
</body>
</html>
