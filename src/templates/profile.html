<!-- Profile View -->
<div id="profile-view" class="view-container profile-view hidden">
    <div class="profile-page-card">
        <div class="profile-hero">
            <div class="profile-avatar-large" id="profile-avatar-large">JD</div>
            <div class="profile-intro">
                <h1 id="field-full-name">John Doe</h1>
                <div class="status-badge"><span class="dot"></span> Professional Account</div>
            </div>
        </div>

        <div class="profile-grid">
            <div class="profile-info-block">
                <label>Username</label>
                <div class="info-value">
                    <i class="fas fa-at"></i>
                    <span id="field-username">johndoe</span>
                </div>
            </div>
            <div class="profile-info-block">
                <label>Email Address</label>
                <div class="info-value">
                    <i class="fas fa-envelope"></i>
                    <span id="field-email">john@example.com</span>
                </div>
            </div>
        </div>

        <div class="profile-analytics">
            <div class="stat-box">
                <span class="stat-value">—</span>
                <span class="stat-label">Documents Analyzed</span>
            </div>
            <div class="stat-box">
                <span class="stat-value">—</span>
                <span class="stat-label">AI Conversations</span>
            </div>
        </div>
    </div>
</div>
