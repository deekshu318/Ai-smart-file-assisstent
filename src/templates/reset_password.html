<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI Smart-File</title>
    <link rel="stylesheet" href="/static/style.css?v=32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(124, 92, 252, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(91, 138, 255, 0.08) 0%, transparent 45%);
            color: #f8fafc;
        }
        .container {
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }
        .reset-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .reset-logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #7c5cfc, #a855f7);
            color: white;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 4px 14px rgba(124, 92, 252, 0.3);
        }
        .reset-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            color: #ffffff;
        }
        .reset-header p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin: 0;
        }
        .reset-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .input-group input:focus {
            border-color: #7c5cfc;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(124, 92, 252, 0.15);
            outline: none;
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .password-wrapper input {
            padding-right: 2.75rem;
        }
        .password-toggle-icon {
            position: absolute;
            right: 1rem;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s ease;
            z-index: 2;
            user-select: none;
            padding: 0.25rem;
        }
        .password-toggle-icon:hover {
            color: #7c5cfc;
        }
        .password-requirements-text {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.35rem;
            line-height: 1.3;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c5cfc, #a855f7);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(124, 92, 252, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(124, 92, 252, 0.4);
        }
        .status-message {
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .status-message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status-message.success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reset-card">
            <div class="reset-header">
                <div class="reset-logo"><i class="fas fa-lock-open"></i></div>
                <h2>New Password</h2>
                <p>Please enter a secure password for <strong style="color: #ffffff;">{{ email }}</strong></p>
            </div>
            
            <form action="/reset-password" method="POST" id="reset-form" class="reset-form">
                <input type="hidden" name="token" value="{{ token }}">
                
                <div class="input-group">
                    <label for="password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle-icon" id="toggle-password"></i>
                    </div>
                    <p class="password-requirements-text">Password must be at least 8 characters, with one uppercase letter, one number, and one special character.</p>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle-icon" id="toggle-confirm-password"></i>
                    </div>
                </div>

                {% if error %}
                    <div class="status-message error" id="server-status-message">{{ error }}</div>
                {% endif %}
                <div class="status-message error hidden" id="client-status-message"></div>

                <button type="submit" class="btn-primary">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        // Setup Password Visibility Toggle
        function setupToggle(toggleId, inputId) {
            const toggleIcon = document.getElementById(toggleId);
            const passwordInput = document.getElementById(inputId);
            if (toggleIcon && passwordInput) {
                toggleIcon.addEventListener('click', () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    if (type === 'password') {
                        toggleIcon.classList.remove('fa-eye-slash');
                        toggleIcon.classList.add('fa-eye');
                    } else {
                        toggleIcon.classList.remove('fa-eye');
                        toggleIcon.classList.add('fa-eye-slash');
                    }
                });
            }
        }
        setupToggle('toggle-password', 'password');
        setupToggle('toggle-confirm-password', 'confirm-password');

        // Form validation
        const form = document.getElementById('reset-form');
        const clientStatus = document.getElementById('client-status-message');
        const serverStatus = document.getElementById('server-status-message');

        form.addEventListener('submit', (e) => {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (serverStatus) {
                serverStatus.classList.add('hidden');
            }
            clientStatus.classList.add('hidden');

            // Client side match check
            if (password !== confirmPassword) {
                e.preventDefault();
                clientStatus.textContent = 'Passwords do not match.';
                clientStatus.classList.remove('hidden');
                return;
            }

            // Strength validation matching the backend
            if (password.length < 8) {
                e.preventDefault();
                clientStatus.textContent = 'Password must be at least 8 characters long.';
                clientStatus.classList.remove('hidden');
                return;
            }
            if (!/[A-Z]/.test(password)) {
                e.preventDefault();
                clientStatus.textContent = 'Password must contain at least one uppercase letter.';
                clientStatus.classList.remove('hidden');
                return;
            }
            if (!/[0-9]/.test(password)) {
                e.preventDefault();
                clientStatus.textContent = 'Password must contain at least one number.';
                clientStatus.classList.remove('hidden');
                return;
            }
            if (!/[^a-zA-Z0-9\s]/.test(password)) {
                e.preventDefault();
                clientStatus.textContent = 'Password must contain at least one special character.';
                clientStatus.classList.remove('hidden');
                return;
            }
        });
    </script>
</body>
</html>
