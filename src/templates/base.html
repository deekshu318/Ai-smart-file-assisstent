<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart-File | Professional Assistant</title>
    <meta name="description" content="AI-powered file analysis and intelligent document assistant.">
    <link rel="stylesheet" href="/static/style.css?v=7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    {% include 'auth.html' %}

    <div class="app-container hidden" id="app-container">
        {% include 'sidebar.html' %}

        <main class="main-view">
            <header class="app-header">
                <div class="header-left">
                    <div class="brand-logo-small"><i class="fas fa-robot"></i></div>
                    <span class="brand-name-small">AI Smart File</span>
                </div>
                
                <div class="header-center">
                    <div class="nav-pill">
                        <button class="nav-tab active" data-view="chat">Chat</button>
                        <button class="nav-tab" data-view="upload">Upload</button>
                        <button class="nav-tab" data-view="library">Library</button>
                        <button class="nav-tab" data-view="assistants">Assistants</button>
                    </div>
                </div>

                <div class="header-right">
                    <div class="account-trigger" id="header-account-trigger">
                        <span>Account</span>
                        <div class="avatar-xs" id="user-initials-header">U</div>
                    </div>
                </div>
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js?v=3"></script>
</body>

</html>
