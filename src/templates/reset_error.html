<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Password Reset</title>
    <link rel="stylesheet" href="/static/style.css?v=32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(239, 68, 68, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(91, 138, 255, 0.05) 0%, transparent 45%);
            color: #f8fafc;
        }
        .container {
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }
        .error-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        .error-icon {
            width: 64px;
            height: 64px;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }
        .error-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.75rem 0;
            color: #ffffff;
        }
        .error-card p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 2rem 0;
        }
        .btn-secondary {
            display: inline-block;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-card">
            <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h2>Reset Failed</h2>
            <p>{{ message }} Please try requesting another password reset link from the homepage.</p>
            <a href="/" class="btn-secondary">Go to Homepage</a>
        </div>
    </div>
</body>
</html>
